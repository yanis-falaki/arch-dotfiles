source = /home/$USER/.cache/wal/colors-hyprland

monitor=,1920x1080@144.00,0x0, 1.0

$terminal = kitty
$fileManager = thunar
$menu = wofi -n
$browser = firefox

exec-once = hypridle
exec-once = waybar
exec-once = awww-daemon
exec-once = sleep .5 && awww restore
exec-once = swaync
exec-once = pypr
exec-once = swaync-client -df
exec-once = pactl set-sink-mute @DEFAULT_SINK@ 0
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = swayosd-server -s ~/.config/swayosd/style.css
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,12
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

general {
    gaps_in = 2
    gaps_out = 10
    border_size = 0
    col.active_border = $color9
    col.inactive_border = $color5
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    active_opacity = 0.78
    inactive_opacity = 0.7
    fullscreen_opacity = 1
    blur {
        enabled = true
        size = 3
        passes = 5
        # FIX: removed deprecated 'new_optimizations' (removed in Hyprland 0.41+)
        ignore_opacity = true
        xray = false
        popups = true
    }
    shadow {
        enabled = true
        range = 15
        render_power = 5
        color = rgba(0,0,0,.5)
    }
}

xwayland {
    force_zero_scaling = true
}

animations {
    enabled = true
    bezier = fluid, 0.15, 0.85, 0.25, 1
    bezier = snappy, 0.3, 1, 0.4, 1
    animation = windows, 1, 3, fluid, popin 5%
    animation = windowsOut, 1, 2.5, snappy
    animation = fade, 1, 4, snappy
    animation = workspaces, 1, 3, snappy, slide
    animation = specialWorkspace, 1, 5, fluid, slidefadevert -35%
    animation = layers, 1, 2, snappy, popin 70%
}

dwindle {
    preserve_split = true
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
    focus_on_activate = true
}

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0.35
    touchpad {
        natural_scroll = false
        scroll_factor = 0.75
    }
}

gestures {
    #workspace_swipe_forever=true
    #workspace_swipe_min_speed_to_force=10000000000000
    gesture = 3, horizontal, workspace
    gesture = 3, vertical, special, magic
    workspace_swipe_distance = 700
    workspace_swipe_min_speed_to_force = 20
    workspace_swipe_use_r=true
}

device {
    name = epic-mouse-v1
    sensitivity = 0
}

$mainMod = SUPER
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive
bind = $mainMod, E, exec, $fileManager
#bind = $mainMod, V, exec, hyprctl --batch "dispatch togglefloating; dispatch resizeactive exact 800 800; dispatch centerwindow 1;"
bind = $mainMod, V, togglefloating
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo
bind = $mainMod, J, togglesplit
bind = $mainMod, F, fullscreenstate, 2, 0
bind = $mainMod, B, exec, $browser
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
$osd = swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')"

bindel = ,XF86AudioRaiseVolume, exec, $osd --output-volume raise
bindel = ,XF86AudioLowerVolume, exec, $osd --output-volume lower
bindel = ,XF86AudioMute,        exec, $osd --output-volume mute-toggle
bindl  = ,XF86AudioMicMute,    exec, $osd --input-volume mute-toggle
bindel = ,XF86MonBrightnessUp,  exec, $osd --brightness +10
bindel = ,XF86MonBrightnessDown,exec, $osd --brightness -10
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bind = ALT, left, movewindow, l
bind = ALT, right, movewindow, r
bind = ALT, up, movewindow, u
bind = ALT, down, movewindow, d
bind = CTRL, Print, exec, hyprshot -m region -o ~/Screenshots/
bind = , Print, exec, hyprshot -m window -o ~/Screenshots/
bind = ALT, Print, exec, hyprshot -m active -m output -o ~/Screenshots/
bind = $mainMod, l, exec, hyprlock
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = ALT, TAB, workspace
bind = ALT, w, exec, ~/.config/hypr/wallpaper.sh
bind = ALT, a, exec, ~/.config/waybar/scripts/refresh.sh
bind = ALT, B, exec, ~/.config/waybar/scripts/select.sh
bind = ALT, r, exec, ~/.config/swaync/refresh.sh
bind = $mainMod, M, exit
bind = $mainMod, SPACE, exec, pypr toggle term
bind = $mainMod, G, exec, pypr toggle music
bind = $mainMod, T, exec, pypr toggle taskbar
#bind = CTRL, ESCAPE, exec, gksu #Dont worry about this

layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.5, match:namespace waybar

layerrule = blur on, match:namespace swaync-control-center
layerrule = ignore_alpha .3, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha .3, match:namespace swaync-notification-window

layerrule = no_anim on, match:namespace selection

layerrule = blur on, match:namespace swayosd
layerrule = ignore_alpha 0.5, match:namespace swayosd

# Picture in picture rules:
windowrule {
    name = picture-in-picture
    match:title = ^(Picture-in-Picture)$
    float = on
    pin = on
    move = 1232 51
}
